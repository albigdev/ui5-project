<!doctype html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1" />
    <meta charset="UTF-8" />
    <title>Our First Application</title>
    <script
      id="sap-ui-bootstrap"
      src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_belize"
      data-sap-ui-libs="sap.m"
    ></script>
    <script>
      sap.ui.define(
        [
          "sap/m/Image",
          "sap/m/RadioButton",
          "sap/m/RadioButtonGroup",
          "sap/m/Toolbar",
          "sap/m/Label",
          "sap/ui/layout/form/SimpleForm",
          "sap/ui/layout/Grid",
          "sap/ui/layout/GridData",
        ],
        function (
          Image,
          RadioButton,
          RadioButtonGroup,
          Toolbar,
          Label,
          SimpleForm,
          Grid,
          GridData,
        ) {
          "use strict";
          const onImagePressed = function (oEvent) {
            const oImgId = oEvent.getSource().getId();

            if (oImgId === "image1") alert("Image 1 Pressed");
            if (oImgId === "image2") alert("Image 2 Pressed");
          };

          const oImage = new Image("image1", {
            src: "images/image1.jpg",
            press: onImagePressed,
            width: "100px",
            height: "100px",
          });

          const oImage2 = new Image("image2", {
            src: "images/image1.jpg",
            press: onImagePressed,
            width: "100px",
            height: "100px",
          });

          oImage.addStyleClass("sapUiSmallMargin");
          oImage2.addStyleClass("sapUiSmallMargin");

          const oRadioButton1 = new RadioButton({
            text: "First Radio Button",
          });

          const oRadioButton2 = new RadioButton({
            text: "Second Radio Button",
          });

          const oRadioButtonGroup = new RadioButtonGroup({
            columns: 2,
            layoutData: new GridData({ span: "XL12 L12 M12 S12" }),
            tooltip: "Radio Button Group Tooltip",
            buttons: [oRadioButton1, oRadioButton2],
          });

          //oRadioButtonGroup.addItem(oRadioButton1);
          //oRadioButtonGroup.addItem(oRadioButton2);

          oImage.placeAt("content");
          oImage2.placeAt("content");

          const oLabel = new Label({
            text: "Radio buttons below",
          });

          const oToolBar = new Toolbar();
          oToolBar.addContent(oLabel);

          const oForm = new SimpleForm({
            layout: "ResponsiveGridLayout",
            content: [oToolBar, oRadioButtonGroup],
          });

          //oForm.addContent(oToolBar);

          const oLayout = new Grid({
            defaultSpan: "XL12 L12 M12 S12",
            content: [oImage, oImage2, oForm],
          });

          oLayout.placeAt("content");
        },
      );
    </script>
  </head>
  <body class="sapUiBody" id="content">
    <label for="w3review">
      Special Charactes with "meta charset="UTF-8":
    </label>
    <br />
    <textarea id="w3review" rows="10" cols="100">
			
			These are Special Characters:-
			méywe
			ÖÄÜß
			ఇవి ప్రత్యేక పాత్రలు
			</textarea
    >
  </body>
</html>
