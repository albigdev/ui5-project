<!doctype html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8" />
    <title>MVC Application</title>
    <script
      id="sap-ui-bootstrap"
      src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
      data-sap-ui-libs="sap.m"
      data-sap-ui-theme="sap_belize"
      data-sap-ui-compatVersion="edge"
      data-sap-ui-resourceroots='{ "gergely.albi.mvcapp" : "./"}'
    ></script>
    <script>
      /*jQuery.sap.registerModulePath('gergely.albi.mvcapp', './webapp/');*/

      sap.ui.define(
        ["sap/ui/core/mvc/XMLView", "sap/ui/model/json/JSONModel"],
        function (XMLView, JSONModel) {
          "use strict";

          const oData = {
            CountSweets: "2",
            SweetsSupplier: [
              {
                ID: 0,
                Name: "Sweet Magic",
                Address: {
                  Street: "Sivarao Street",
                  City: "Vijayawada",
                  State: "Andhra Pradesh",
                  ZipCode: "521456",
                  Country: "INDIA",
                },
              },
              {
                ID: "1",
                Name: "Aanjaneya Sweets",
                Address: {
                  Street: "Bhavanipuram",
                  City: "Vijayawada",
                  State: "Andhra Pradesh",
                  ZipCode: "521456",
                  Country: "INDIA",
                },
              },
            ],
          };

          //Model creation and setting the data
          const oModel = new JSONModel();
          oModel.setData(oData);

          //Setting the data to the core
          sap.ui.getCore().setModel(oModel);

          async function init() {
            const oView = await XMLView.create({
              viewName: "gergely.albi.mvcapp.view.App",
            });
            oView.placeAt("content");
          }
          init();
        },
      );

      // const oView = sap.ui.view("appView", {
      //   viewName: "gergely.albi.mvcapp.view.App",
      //   type: sap.ui.core.mvc.ViewType.XML,
      // });

      // const oApp = oView.byId("app");
      // oView.placeAt("content");
    </script>
  </head>
  <body class="sapUiBody" role="application">
    <div id="content"></div>
  </body>
</html>
